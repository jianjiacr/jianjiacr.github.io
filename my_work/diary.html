<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>日记查看</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .markdown-body {
            padding: 1rem;
            background: white;
            border-radius: 0.75rem;
            line-height: 1.7;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }
        .markdown-body h1 { font-size: 1.8rem; font-weight: bold; margin-bottom: 0.8rem; }
        .markdown-body h2 { font-size: 1.5rem; font-weight: bold; margin-bottom: 0.6rem; }
        .markdown-body h3 { font-size: 1.2rem; font-weight: bold; margin-bottom: 0.4rem; }
        .markdown-body p { margin-bottom: 1rem; }
        .markdown-body ul, .markdown-body ol { margin-left: 1.5rem; margin-bottom: 1rem; }
        .markdown-body code {
            background: #f3f4f6;
            padding: 0.2em 0.4em;
            border-radius: 0.25rem;
            font-size: 0.9em;
            word-break: break-all;
        }
        .markdown-body pre {
            background: #1f2937;
            color: #f9fafb;
            padding: 1rem;
            border-radius: 0.5rem;
            overflow-x: auto;
            margin-bottom: 1rem;
        }
        .markdown-body blockquote {
            border-left: 4px solid #9ca3af;
            padding-left: 1rem;
            color: #4b5563;
            margin-bottom: 1rem;
        }
        .markdown-body a {
            color: #3498db;
            text-decoration: underline;
        }
        .plain-text {
            white-space: pre-wrap;
            word-wrap: break-word;
            padding: 1rem;
            background: white;
            border-radius: 0.75rem;
            line-height: 1.7;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen flex flex-col items-center justify-center p-6">

    <div class="bg-white rounded-2xl shadow-lg p-8 max-w-3xl w-full">
        <h2 id="diaryTitle" class="text-2xl font-bold text-primary mb-2">日记</h2>
        <p id="diaryDate" class="text-gray-500 mb-6"></p>
        
        <div id="diaryContent" class="markdown-body">
            <!-- 内容由JS动态加载 -->
        </div>

        <div class="mt-8 text-center">
            <a href="index.html" class="text-secondary hover:underline text-sm">
                <i class="fa-solid fa-arrow-left mr-1"></i>返回日历
            </a>
        </div>
    </div>

    <script>
        // 简易 Markdown 解析器（仅用于 .md 文件）
        function simpleMarkdownParser(md) {
            if (!md) return '';
            let html = md;
            html = html.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
            html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
            html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
            html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
            html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
            html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
            html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
            html = html.replace(/^[\-\*] (.+)$/gm, '<li>$1</li>');
            html = html.replace(/(<li>.*<\/li>(\n|$))+/g, '<ul>$&</ul>');
            const lines = html.split('\n');
            let result = [];
            let buffer = [];
            for (let line of lines) {
                if (/^\s*<(h[1-6]|ul|ol|li|pre|blockquote)/.test(line) || /^\s*<\/(ul|ol)>/.test(line)) {
                    if (buffer.length) { result.push('<p>' + buffer.join(' ') + '</p>'); buffer = []; }
                    result.push(line);
                } else if (line.trim() === '') {
                    if (buffer.length) { result.push('<p>' + buffer.join(' ') + '</p>'); buffer = []; }
                } else {
                    buffer.push(line);
                }
            }
            if (buffer.length) result.push('<p>' + buffer.join(' ') + '</p>');
            return result.join('\n');
        }

        // 主逻辑包裹在函数中，避免全局 return
        (function() {
            const urlParams = new URLSearchParams(window.location.search);
            const dateStr = urlParams.get('date');
            const contentDiv = document.getElementById('diaryContent');
            const dateEl = document.getElementById('diaryDate');

            if (!dateStr || dateStr.length !== 8) {
                contentDiv.innerHTML = '<p class="text-red-500">无效的日期</p>';
                return;
            }

            const year = dateStr.substring(0, 4);
            const month = dateStr.substring(4, 6);
            const day = dateStr.substring(6, 8);
            dateEl.textContent = `${year}年${month}月${day}日`;

            // 加载顺序：.txt 优先（CDN -> Raw），.md 备用
            const loadOrder = [
                { url: `https://cdn.jsdelivr.net/gh/youqishan/youqishan.github.io@master/my_work/diary/${dateStr}.txt`, type: 'txt' },
                { url: `https://raw.githubusercontent.com/youqishan/youqishan.github.io/master/my_work/diary/${dateStr}.txt`, type: 'txt' },
                { url: `https://cdn.jsdelivr.net/gh/youqishan/youqishan.github.io@master/my_work/diary/${dateStr}.md`, type: 'md' },
                { url: `https://raw.githubusercontent.com/youqishan/youqishan.github.io/master/my_work/diary/${dateStr}.md`, type: 'md' }
            ];

            // 缓存
            const cache = new Map();
            const cacheKey = `diary_${dateStr}`;

            // 检查缓存（内存 -> sessionStorage）
            if (cache.has(cacheKey)) {
                renderContent(cache.get(cacheKey));
                return;
            }
            const sessionCached = sessionStorage.getItem(cacheKey);
            if (sessionCached) {
                renderContent(sessionCached);
                return;
            }

            contentDiv.innerHTML = '<p class="text-gray-400">加载中...</p>';

            // 依次尝试加载
            (async function() {
                for (const { url, type } of loadOrder) {
                    try {
                        const response = await fetch(url);
                        if (response.ok) {
                            const text = await response.text();
                            // 存入缓存
                            cache.set(cacheKey, text);
                            try { sessionStorage.setItem(cacheKey, text); } catch (e) {}
                            // 根据类型渲染
                            if (type === 'txt') {
                                contentDiv.className = 'plain-text';
                                contentDiv.textContent = text;
                            } else {
                                contentDiv.className = 'markdown-body';
                                contentDiv.innerHTML = simpleMarkdownParser(text);
                            }
                            return;
                        }
                    } catch (e) {
                        // 继续尝试下一个 URL
                    }
                }
                // 全部失败
                contentDiv.className = 'markdown-body';
                contentDiv.innerHTML = '<p class="text-gray-500 italic">暂无日记</p>';
            })();
        })();
    </script>
</body>
</html>
