    <!-- ==================== 脚本区 (轮播 / 月历 / 侧边栏) ==================== -->
    <!-- 轮播控制脚本 -->
    <script>
        (function() {
            const track = document.getElementById('sliderTrack');
            const slides = Array.from(track.children);
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            const dotsContainer = document.getElementById('dotsContainer');

            let currentIndex = 0;
            const slideCount = slides.length;
            const autoIntervalTime = 3000;
            let autoTimer;

            function createDots() {
                for (let i = 0; i < slideCount; i++) {
                    const dot = document.createElement('button');
                    dot.classList.add('w-3', 'h-3', 'rounded-full', 'bg-gray-400', 'hover:bg-gray-600', 'transition');
                    dot.setAttribute('aria-label', `切换到第${i + 1}张`);
                    dot.addEventListener('click', () => goToSlide(i));
                    dotsContainer.appendChild(dot);
                }
            }

            function updateDots() {
                const dots = dotsContainer.children;
                for (let dot of dots) {
                    dot.classList.remove('bg-secondary', 'scale-125');
                    dot.classList.add('bg-gray-400');
                }
                if (dots[currentIndex]) {
                    dots[currentIndex].classList.remove('bg-gray-400');
                    dots[currentIndex].classList.add('bg-secondary', 'scale-125');
                }
            }

            function goToSlide(index) {
                if (index < 0) index = slideCount - 1;
                if (index >= slideCount) index = 0;
                currentIndex = index;
                track.style.transform = `translateX(-${currentIndex * 100}%)`;
                updateDots();
            }

            function nextSlide() { goToSlide(currentIndex + 1); }
            function prevSlide() { goToSlide(currentIndex - 1); }

            function startAuto() {
                stopAuto();
                autoTimer = setInterval(nextSlide, autoIntervalTime);
            }

            function stopAuto() { clearInterval(autoTimer); }

            if (nextBtn && prevBtn) {
                nextBtn.addEventListener('click', () => { nextSlide(); stopAuto(); startAuto(); });
                prevBtn.addEventListener('click', () => { prevSlide(); stopAuto(); startAuto(); });
            }

            const sliderContainer = document.querySelector('#slider-section .relative');
            if (sliderContainer) {
                sliderContainer.addEventListener('mouseenter', stopAuto);
                sliderContainer.addEventListener('mouseleave', startAuto);
            }

            if (slideCount > 0) {
                createDots();
                updateDots();
                startAuto();
            }
        })();
    </script>

    <!-- 迷你月历脚本 (保留完整日历功能) -->
    <script>
        (function() {
            const now = new Date();
            const year = now.getFullYear();
            const month = now.getMonth();
            const monthTitle = document.getElementById('miniMonthYear');
            if (monthTitle) monthTitle.textContent = `${year}年${month + 1}月`;

            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const todayDate = now.getDate();

            let html = '';
            let dayCount = 1;
            for (let i = 0; i < 6; i++) {
                html += '<tr>';
                for (let j = 0; j < 7; j++) {
                    const cellIndex = i * 7 + j;
                    if (cellIndex < firstDay || dayCount > daysInMonth) {
                        html += '<td></td>';
                    } else {
                        if (dayCount === todayDate) {
                            html += `<td><span class="today">${dayCount}</span></td>`;
                        } else {
                            html += `<td>${dayCount}</td>`;
                        }
                        dayCount++;
                    }
                }
                html += '</tr>';
                if (dayCount > daysInMonth) break;
            }
            const calendarBody = document.getElementById('miniCalendarBody');
            if (calendarBody) calendarBody.innerHTML = html;
        })();
    </script>

    <!-- 侧边栏切换脚本 (保留完整交互) -->

                        toggleIcon.classList.add('fa-chevron-right');

                sidebar.querySelectorAll('a').forEach(link => {
                    link.addEventListener('click', () => {
                        sidebar.classList.remove('open');
                        toggleIcon.classList.remove('fa-chevron-left');
                        toggleIcon.classList.add('fa-chevron-right');
                    });
                });
            }
        })();
    </script>
